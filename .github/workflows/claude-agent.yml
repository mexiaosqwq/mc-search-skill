name: AI Code Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  issues:
    types: [opened]

# 防止无限循环：跳过 bot 自己触发的 comment
concurrency:
  group: ai-agent-${{ github.event_name }}-${{ github.event.number || 'default' }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{ github.event_name != 'issue_comment' ||
          github.event.comment.user.login != 'github-actions[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr_info
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Get issue info
        if: github.event_name == 'issues'
        id: issue_info
        run: |
          echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Get PR diff
        if: github.event_name == 'pull_request'
        id: diff
        run: |
          diff_output=$(git diff ${{ github.base_ref }}...${{ github.event.pull_request.head.ref }} -- . ':(exclude).github/workflows/claude-agent.yml' 2>/dev/null)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff_output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TITLE="${{ steps.pr_info.outputs.title }}"
            CONTENT="Review this PR:\n\nTitle: $TITLE\n\nChanges:\n${{ steps.diff.outputs.diff }}"
          else
            TITLE="${{ steps.issue_info.outputs.title }}"
            BODY="${{ github.event.issue.body }}"
            CONTENT="Respond to this Issue:\n\nTitle: $TITLE\n\nBody: $BODY"
          fi

          response=$(curl -s -X POST "$BASE_URL/chat/completions" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"glm-5\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are an expert code reviewer for mcmod-info (Minecraft mod lookup tool). Be concise. Reply in Chinese. Focus on bugs, security, performance, code quality.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"$CONTENT\"
                }
              ],
              \"max_tokens\": 1200
            }")

          echo "$response" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    content = data.get('choices', [{}])[0].get('message', {}).get('content', 'API error')
    print(content)
except Exception as e:
    print('Error: ' + str(e))
" > response.txt 2>/dev/null || echo "API error" > response.txt
          echo "content=$(cat response.txt | sed 's/"/\\"/g' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Post comment
        if: github.event_name != 'issue_comment' || github.event.comment.user.login != 'github-actions[bot]'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = `${{ steps.review.outputs.content }}`;
            const number = ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }};
            const isPR = '${{ github.event_name }}' == 'pull_request';

            const body = `🤖 **AI Code Review**\n\n${response}`;

            if (isPR) {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number
              });
              const existing = comments.data.find(
                c => c.user.login === 'github-actions[bot]' && c.body.includes('AI Code Review')
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  body: body
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body: body
              });
            }
